[general]
import = ["~/.config/alacritty/catppuccin-mocha.toml"]

[font]
size = 13.0

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

[window]
padding = { x = 8, y = 8 }
decorations = "buttonless"

[cursor]
style = { shape = "Block", blinking = "On" }
